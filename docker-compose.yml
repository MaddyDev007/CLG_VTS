services:
  postgres:
    image: postgres:15
    container_name: vts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vts123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: vts-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  redis:
    image: redis:7-alpine
    container_name: vts-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.23
    container_name: vts-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: vts123
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres

  temporal-ui:
    image: temporalio/ui:latest
    container_name: vts-temporal-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  backend:
    build:
      context: ./code/vts-backend
      dockerfile: Dockerfile
    container_name: vts-backend
    restart: unless-stopped
    env_file:
      - ./code/vts-backend/.env.docker
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vts
      DB_USER: postgres
      DB_PASSWORD: vts123
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_TELEMETRY_TOPIC: vts/devices/+/telemetry
      UDP_PORT: 4001
      TCP_PORT: 4002
      TCP_HOST: 0.0.0.0
      TEMPORAL_ADDRESS: temporal:7233
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://${PUBLIC_HOST:-localhost}:5173,http://${PUBLIC_HOST:-localhost}:3011
    ports:
      - "3000:3000"
      - "4001:4001/udp"
      - "4002:4002"
    depends_on:
      - postgres
      - redis
      - mosquitto
      - temporal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/docs', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./code/vts-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://${PUBLIC_HOST:-localhost}:3000
        VITE_WS_URL: ws://${PUBLIC_HOST:-localhost}:3000
    container_name: vts-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  vts-device-simulator:
    build:
      context: ./code/vts-device-simulator
      dockerfile: Dockerfile
      args:
        VITE_DEVICE_SIMULATOR_URL: http://${PUBLIC_HOST:-localhost}:3011
        VITE_MQTT_TOPIC_PREFIX: vts
    container_name: vts-device-simulator
    restart: unless-stopped
    environment:
      SIMULATOR_SERVER_PORT: 3011
      POSTGRES_URL: postgres://postgres:vts123@postgres:5432/vts
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      SIM_PROTOCOL: mqtt
      SIM_TCP_HOST: backend
      SIM_TCP_PORT: 4002
      SIM_UDP_HOST: backend
      SIM_UDP_PORT: 4001
    ports:
      - "3011:3011"
    depends_on:
      - postgres
      - mosquitto
      - backend

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
