services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-15-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vts}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vts123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vts_app

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vts_app

  backend:
    build:
      context: ./code/vts-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./docker/env/backend.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vts}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-vts123}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      TEMPORAL_ENABLED: ${TEMPORAL_ENABLED:-false}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-}
      REDIS_URL: ${REDIS_URL:-}
    expose:
      - "3000"
      - "4001/udp"
      - "4002"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - vts_app

  frontend:
    build:
      context: ./code/vts-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/telemetry}
        NODE_OPTIONS: ${FRONTEND_NODE_OPTIONS:---max-old-space-size=512}
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vts_app

  vts-device-simulator:
    profiles:
      - simulator
    build:
      context: ./code/vts-device-simulator
      dockerfile: Dockerfile
      args:
        VITE_DEVICE_SIMULATOR_URL: ${VITE_DEVICE_SIMULATOR_URL:-}
        VITE_MQTT_TOPIC_PREFIX: ${VITE_MQTT_TOPIC_PREFIX:-vts}
        NODE_OPTIONS: ${SIMULATOR_NODE_OPTIONS:---max-old-space-size=384}
    restart: unless-stopped
    env_file:
      - ./docker/env/simulator.env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${DB_PASSWORD:-vts123}@postgres:5432/${POSTGRES_DB:-vts}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    ports:
      - "${SIMULATOR_BIND_ADDRESS:-0.0.0.0}:${SIMULATOR_PORT:-3011}:3011"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3011/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vts_app

networks:
  vts_app:
    name: vts_app

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
