[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Replace this with your actual detected USB port
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; Firmware deployment values now come from Firmware/include/config.h.
; Set MQTT_BROKER there to the old backend host machine LAN/public IP or domain.
; Do not override DEVICE_ID / MQTT_* here unless you intentionally want
; build-time environment-specific values to replace config.h.

[env:esp32prod]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Replace this with your actual detected USB port
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; Production also reads deployment values from Firmware/include/config.h.
; Set the real old-backend broker host, credentials, and DEVICE_ID there before upload.
